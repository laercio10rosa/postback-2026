<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postback GemiAd 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{background:#1e293b;border-radius:16px;padding:40px;width:100%;max-width:480px;box-shadow:0 25px 50px rgba(0,0,0,.5)}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-size:1.5rem;font-weight:700;color:#6366f1}
.logo p{color:#94a3b8;font-size:.85rem;margin-top:4px}
label{display:block;font-size:.8rem;color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px 16px;color:#e2e8f0;font-size:.95rem;outline:none;transition:border-color .2s}
input:focus{border-color:#6366f1}
button{width:100%;background:#6366f1;color:#fff;border:none;border-radius:8px;padding:14px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:16px;transition:background .2s}
button:hover{background:#4f46e5}
button:disabled{background:#334155;cursor:not-allowed}
.result{margin-top:20px;padding:16px;border-radius:8px;font-size:.85rem;display:none}
.result.success{background:#064e3b;border:1px solid #059669;color:#6ee7b7;display:block}
.result.error{background:#450a0a;border:1px solid #dc2626;color:#fca5a5;display:block}
.result.loading{background:#1e3a5f;border:1px solid #3b82f6;color:#93c5fd;display:block}
.field-group{margin-bottom:16px}
.opt{font-size:.7rem;color:#64748b;margin-left:4px}
/* Modal overlay */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#1e293b;border-radius:12px;padding:32px;width:100%;max-width:340px;box-shadow:0 25px 50px rgba(0,0,0,.6)}
.modal h2{font-size:1.1rem;font-weight:600;color:#e2e8f0;margin-bottom:20px;text-align:center}
.modal input{margin-bottom:0}
.modal button{margin-top:12px}
.modal-cancel{background:#334155;margin-top:8px}
.modal-cancel:hover{background:#475569}
</style>
</head>
<body>

<!-- Modal de senha -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Confirmar disparo</h2>
    <div class="field-group">
      <label>Senha</label>
      <input type="password" id="modalPw" placeholder="Digite a senha" onkeydown="if(event.key==='Enter')confirmFire();if(event.key==='Escape')closeModal()">
    </div>
    <button onclick="confirmFire()">Confirmar e Disparar</button>
    <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<div class="container">
  <div class="logo">
    <h1>Postback GemiAd</h1>
    <p>Disparo via Apps Script</p>
  </div>
  <div class="field-group">
    <label>Click ID <span class="opt">(subconta ActionPay)</span></label>
    <input type="text" id="clickId" placeholder="Ex: 60feb74c8cf528e3f3698f50...">
  </div>
  <div class="field-group">
    <label>Event ID <span class="opt">(opcional)</span></label>
    <input type="text" id="eventId" placeholder="Ex: 25961">
  </div>
  <div class="field-group">
    <label>IP do usuario <span class="opt">(opcional)</span></label>
    <input type="text" id="ip" placeholder="Ex: 177.132.0.1">
  </div>
  <button id="btn" onclick="openModal()">Disparar Postback</button>
  <div id="res" class="result"></div>
</div>

<script>
var U='https://script.google.com/macros/s/AKfycbwOigk9P6BOkpfJwKpCmIU5BWQ5RNysh68MVydW8j7JieU8vtdeCGn1UpBh8oXX92gImQ/exec';
var S='202412';

function openModal(){
  var c=document.getElementById('clickId').value.trim();
  if(!c){
    var r=document.getElementById('res');
    r.className='result error';
    r.textContent='Preencha o Click ID antes de disparar!';
    return;
  }
  document.getElementById('modalPw').value='';
  document.getElementById('modalOverlay').classList.add('active');
  setTimeout(function(){document.getElementById('modalPw').focus();},100);
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('active');
}

async function confirmFire(){
  var pw=document.getElementById('modalPw').value;
  if(pw!==S){
    document.getElementById('modalPw').value='';
    document.getElementById('modalPw').placeholder='Senha incorreta, tente novamente';
    return;
  }
  closeModal();
  var c=document.getElementById('clickId').value.trim();
  var e=document.getElementById('eventId').value.trim();
  var ip=document.getElementById('ip').value.trim();
  var r=document.getElementById('res');
  var b=document.getElementById('btn');
  b.disabled=true;b.textContent='Disparando...';
  r.className='result loading';r.textContent='Chamando servidor...';
  var url=U+'?clickId='+encodeURIComponent(c);
  if(e)url+='&eventId='+encodeURIComponent(e);
  if(ip)url+='&ip='+encodeURIComponent(ip);
  try{
    var resp=await fetch(url);
    var data=await resp.json();
    if(data.status==='success'){
      r.className='result success';
      r.innerHTML='Postback disparado com sucesso!<br><small>HTTP '+data.httpCode+' &mdash; ClickID: '+c+'</small>';
    }else{
      r.className='result error';
      r.textContent='Erro: '+(data.message||'Falha desconhecida');
    }
  }catch(ex){
    r.className='result error';
    r.textContent='Erro de conexao: '+ex.message;
  }
  b.disabled=false;b.textContent='Disparar Postback';
}

// Fechar modal clicando fora
document.getElementById('modalOverlay').addEventListener('click',function(ev){
  if(ev.target===this)closeModal();
});
</script>
</body>
</html>
